# Auto-generate diagrams on code changes
name: Generate Diagrams

on:
  push:
    branches: [main, master]
    paths:
      - 'clickup_framework/**/*.py'
      - '.diagram-pipeline.yaml'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  generate-diagrams:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for comprehensive analysis

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Install ctags
        run: |
          sudo apt-get update
          sudo apt-get install -y universal-ctags

      - name: Generate diagrams
        run: |
          cum batch-diagram --config .diagram-pipeline.yaml

      - name: Check for changes
        id: verify-changes
        run: |
          if git diff --quiet docs/diagrams/; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated diagrams
        if: steps.verify-changes.outputs.changes == 'true' && github.event_name == 'push'
        run: |
          git config user.name "Diagram Bot"
          git config user.email "bot@example.com"
          git add docs/diagrams/
          git commit -m "Update diagrams from latest code changes"
          git push

      - name: Upload diagrams as artifacts
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: generated-diagrams
          path: docs/diagrams/
          retention-days: 7
